name: Hosted Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * 1-5"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate hosted smoke secrets
        env:
          GCOP_API_BASE: ${{ secrets.GCOP_API_BASE }}
          DEMO_ACCESS_PASSWORD: ${{ secrets.DEMO_ACCESS_PASSWORD }}
        run: |
          python - <<'PY'
          import os, sys
          missing = [name for name in ("GCOP_API_BASE", "DEMO_ACCESS_PASSWORD") if not os.getenv(name, "").strip()]
          if missing:
              print(f"Missing required GitHub Actions secrets: {', '.join(missing)}", file=sys.stderr)
              raise SystemExit(1)
          print("Hosted smoke secrets are configured.")
          PY

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run hosted smoke
        env:
          GCOP_API_BASE: ${{ secrets.GCOP_API_BASE }}
          DEMO_ACCESS_PASSWORD: ${{ secrets.DEMO_ACCESS_PASSWORD }}
        run: python scripts/smoke_remote_demo.py --timeout 90 --skip-approval-flow
