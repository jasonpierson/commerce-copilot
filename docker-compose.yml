version: "3.9"
services:
  api:
    build: .
    image: commerce-ops-copilot:latest
    ports:
      - "8000:8000"
    # Use local env file for secrets/config; do not commit it
    env_file:
      - .env.local
    environment:
      - PYTHONUNBUFFERED=1
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    command: ["python", "scripts/run_api.py"]
