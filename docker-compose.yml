version: "3.9"
services:
  api:
    build: .
    image: commerce-ops-copilot:latest
    ports:
      - "8000:8000"
    # Use local env file for secrets/config; do not commit it
    env_file:
      - .env.local
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
